<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f14" />
  <title>Angela-Ye · 带货视频翻译 & 妆容转换</title>
  <style>
    :root {
      --bg: #0f0f14;
      --card: #1a1a24;
      --card-2: #22222f;
      --text: #f5f5f7;
      --muted: #9a9aab;
      --brand: #ff2d55;
      --brand-2: #7a5cff;
      --ok: #2ecc71;
      --radius: 18px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(120% 80% at 50% -10%, #1d1430 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    }
    header.brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 2px 18px;
    }
    .logo {
      width: 38px; height: 38px;
      border-radius: 12px;
      display: grid; place-items: center;
      font-weight: 800; font-size: 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 6px 20px rgba(255,45,85,.35);
    }
    .brand h1 { font-size: 17px; margin: 0; letter-spacing: .3px; }
    .brand p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }

    .hero {
      background: linear-gradient(160deg, rgba(122,92,255,.18), rgba(255,45,85,.10));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 22px 18px;
      margin-bottom: 16px;
    }
    .hero h2 { font-size: 24px; line-height: 1.3; margin: 0 0 8px; }
    .hero h2 span { background: linear-gradient(90deg, var(--brand), var(--brand-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 14px;
    }
    label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 8px; }
    input[type="url"], select {
      width: 100%;
      background: var(--card-2);
      border: 1px solid rgba(255,255,255,.10);
      color: var(--text);
      border-radius: 12px;
      padding: 14px 14px;
      font-size: 16px; /* >=16px avoids iOS zoom-on-focus */
      outline: none;
      appearance: none;
    }
    input:focus, select:focus { border-color: var(--brand-2); }
    .row { display: flex; gap: 10px; margin-top: 14px; }
    .row > div { flex: 1; }

    button.cta {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 8px 24px rgba(122,92,255,.35);
      cursor: pointer;
      transition: transform .08s ease, opacity .2s;
    }
    button.cta:active { transform: scale(.98); }
    button.cta:disabled { opacity: .6; cursor: not-allowed; }

    .result { display: none; }
    .result.show { display: block; animation: fade .35s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .progress {
      height: 8px; border-radius: 8px; background: var(--card-2); overflow: hidden; margin: 4px 0 14px;
    }
    .progress > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--brand), var(--brand-2)); transition: width .2s; }

    .steps { list-style: none; margin: 0; padding: 0; }
    .steps li {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; font-size: 14px; color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .steps li:last-child { border-bottom: none; }
    .steps li .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--muted); flex: 0 0 auto; display: grid; place-items: center; font-size: 12px; }
    .steps li.done { color: var(--text); }
    .steps li.done .dot { border-color: var(--ok); background: var(--ok); color: #0f0f14; }

    .out {
      margin-top: 14px; background: var(--card-2); border-radius: 12px; padding: 14px;
      font-size: 14px; line-height: 1.7;
    }
    .out .lang-badge { display: inline-block; font-size: 12px; color: var(--brand-2); background: rgba(122,92,255,.15); padding: 2px 8px; border-radius: 999px; margin-bottom: 8px; }
    footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }
  </style>
</head>
<body>
  <main class="app">
    <header class="brand">
      <div class="logo">A</div>
      <div>
        <h1>Angela-Ye</h1>
        <p>带货视频翻译 &amp; 妆容转换</p>
      </div>
    </header>

    <section class="hero">
      <h2>把一条 TikTok 带货视频<br /><span>一键翻译 &amp; 换妆</span></h2>
      <p>粘贴视频链接，选择目标语言与妆容风格，自动生成配音字幕并预览妆容效果。移动端优化，随时随地在手机上操作。</p>
    </section>

    <section class="card">
      <label for="videoUrl">视频链接</label>
      <input id="videoUrl" type="url" inputmode="url" placeholder="https://www.tiktok.com/@user/video/..." />
      <div class="row">
        <div>
          <label for="lang">目标语言</label>
          <select id="lang">
            <option value="英语">英语 English</option>
            <option value="日语">日语 日本語</option>
            <option value="韩语">韩语 한국어</option>
            <option value="西班牙语">西班牙语 Español</option>
          </select>
        </div>
        <div>
          <label for="style">妆容风格</label>
          <select id="style">
            <option value="自然裸妆">自然裸妆</option>
            <option value="韩系清透">韩系清透</option>
            <option value="欧美浓妆">欧美浓妆</option>
            <option value="国风红唇">国风红唇</option>
          </select>
        </div>
      </div>
      <button class="cta" id="startBtn">开始转换</button>
    </section>

    <section class="card result" id="result">
      <div class="progress"><i id="bar"></i></div>
      <ul class="steps" id="steps">
        <li data-step><span class="dot"></span>提取音频与人脸</li>
        <li data-step><span class="dot"></span>语音识别与翻译</li>
        <li data-step><span class="dot"></span>生成目标语言配音字幕</li>
        <li data-step><span class="dot"></span>应用妆容转换并合成</li>
      </ul>
      <div class="out" id="out"></div>
    </section>

    <footer>© 2026 Angela-Ye · 移动端预览版</footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const startBtn = $("startBtn");
    const result = $("result");
    const steps = [...document.querySelectorAll("[data-step]")];
    const bar = $("bar");
    const out = $("out");

    function reset() {
      result.classList.remove("show");
      steps.forEach((s) => s.classList.remove("done"));
      bar.style.width = "0%";
      out.innerHTML = "";
    }

    startBtn.addEventListener("click", async () => {
      const url = $("videoUrl").value.trim() || "https://www.tiktok.com/@demo/video/123";
      const lang = $("lang").value;
      const style = $("style").value;

      reset();
      startBtn.disabled = true;
      startBtn.textContent = "转换中…";
      result.classList.add("show");

      for (let i = 0; i < steps.length; i++) {
        await new Promise((r) => setTimeout(r, 650));
        steps[i].classList.add("done");
        bar.style.width = Math.round(((i + 1) / steps.length) * 100) + "%";
      }

      out.innerHTML =
        '<span class="lang-badge">' + lang + " · " + style + "</span>" +
        "<div><strong>字幕预览：</strong>Hi everyone! Today I'm sharing my must-have beauty pick — swipe up to grab it now!</div>" +
        '<div style="margin-top:8px;color:var(--muted)">源链接：' + url + "</div>" +
        '<div style="margin-top:8px;color:var(--ok)">✓ 转换完成，可导出竖版 9:16 成片</div>';

      startBtn.disabled = false;
      startBtn.textContent = "重新转换";
    });
  </script>
</body>
</html>
